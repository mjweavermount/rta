kind: BoundedContext
name: Billing
classification: supporting
description: Billing provides generic rules, classifier decisions, and reactions for the golden fixture.
guidance: Use this context to exercise decision implementation shapes and reaction coverage with minimal domain noise.

runtimeCapabilities:
  - name: OperatorVault
    kind: vault-secret-backend
    description: Supplies operator-scoped credentials for the golden gateway surface.
    configFields:
      - { name: mount, type: NonEmptyString }
    secretFields:
      - { name: token, type: SecretRef }
    appBindings: [local-demo, production-lab]
  - name: AffineGraphqlClient
    kind: graphql-client
    description: Calls the external AFFiNE GraphQL API through an outbound adapter.
    configFields:
      - { name: endpoint, type: Url }
      - { name: timeoutMs, type: PositiveInt }
    appBindings: [local-demo, production-lab]
  - name: HomeLabWorkloadApp
    kind: hosting-adapter
    description: Optional adapter that can render this RTA app as a home-lab WorkloadApp draft.
    configFields:
      - { name: namespace, type: NonEmptyString }
      - { name: routeHost, type: NonEmptyString }
    appBindings: [production-lab]

ports:
  - name: AffineDocumentPort
    kind: graphql-client
    direction: outbound
    description: Reads AFFiNE documents through an external connector without leaking the AFFiNE model into Billing.
    operations: [currentUser, readDocument]
    inputSchemas: [AffineDocReadInput]
    outputSchemas: [AffineDocReadOutput]
    policies: [AffineToolPolicy]

boundarySchemas:
  - name: AffineDocReadInput
    kind: dto
    description: Boundary DTO accepted by the AFFiNE document read adapter before it maps to internal query intent.
    source: effect-schema
    fields:
      - { name: docId, type: NonEmptyString }
    mapsTo: GetInvoice
    validation:
      required: true
      strategy: decode
    sanitization:
      required: true
      strategy: mcp-tool
      produces: internal
    openapiRef: "#/components/schemas/AffineDocReadInput"
  - name: AffineDocReadOutput
    kind: output
    description: Boundary output DTO returned by the AFFiNE document read adapter.
    source: openapi
    fields:
      - { name: docId, type: NonEmptyString }
      - { name: markdown, type: String }
    validation:
      required: true
      strategy: validate-only
    sanitization:
      required: true
      strategy: external-api-response
      produces: sanitized
    openapiRef: "#/components/schemas/AffineDocReadOutput"

adapterBindings:
  - name: LocalAffineDocumentBinding
    port: AffineDocumentPort
    adapter: FakeAffineGraphqlAdapter
    target: local-demo
    description: Local demo uses a fake adapter with the same port contract.
    mode: fake
    configSchema: AffineDocReadInput
    driftCheck: affine-openapi-contract
    boundaryPipeline:
      inputSchema: AffineDocReadInput
      outputSchema: AffineDocReadOutput
      decode: true
      sanitize: true
      normalize: true
      authorize: true
      translateTo: GetInvoice
      logs:
        promotion: true
        rejection: true

publishedLanguages:
  - name: BillingOpenApi
    protocol: openapi
    description: Public API contract for the Billing boundary DTOs.
    boundarySchemas: [AffineDocReadInput, AffineDocReadOutput]
    ports: [AffineDocumentPort]
    source: openapi/billing.yaml

toolSurfaces:
  - name: AffineMcp
    description: Minimal governed MCP-style surface used to prove tool safety and runtime capabilities.
    service: affine
    protocol: mcp
    runtimeCapabilities: [OperatorVault, AffineGraphqlClient]
    policy: AffineToolPolicy
    tools:
      - name: affine.current_user
        description: Reads the current AFFiNE user through GraphQL.
        safety: read
        credentialMode: user-required
        runtimeCapabilities: [AffineGraphqlClient]
        returns: CurrentUser
      - name: affine.doc_update
        description: Document mutation is declared but intentionally unavailable in the golden fixture.
        safety: fail-closed
        credentialMode: user-required
        runtimeCapabilities: [OperatorVault, AffineGraphqlClient]
        failClosedReason: Golden fixture has not verified AFFiNE write semantics.

deploymentIntents:
  - name: BillingLocalContainer
    app: billing
    target: container
    adapter: container
    optional: false
    description: Local container package for exercising deployment without requiring any host.
    image:
      repository: ghcr.io/mjweavermount/rta-billing
      tag: local
    processes:
      - name: api
        role: api
        command: [node, dist/cli.js, serve]
        ports:
          - { name: http, port: 8080, protocol: http }
    healthCheck:
      process: api
      path: /healthz
      port: http
    configSchemas: [AffineDocReadInput]
    promotion:
      requiresReview: false
      writesToExternalSystem: false
  - name: BillingHomeLabDraft
    app: billing
    target: home-lab
    adapter: workload-app
    optional: true
    description: Optional WorkloadApp draft output for Virgil's lab; not required for local app use.
    runtimeCapability: HomeLabWorkloadApp
    image:
      repository: ghcr.io/mjweavermount/rta-billing
      tag: latest
    processes:
      - name: api
        role: api
        command: [node, dist/cli.js, serve]
        ports:
          - { name: http, port: 8080, protocol: http }
    healthCheck:
      process: api
      path: /healthz
      port: http
    promotion:
      requiresReview: true
      writesToExternalSystem: true

aggregates:
  - name: Invoice
    description: A lightweight invoice aggregate used to trigger billing decisions and reactions.
    guidance: The aggregate is intentionally tiny; its job is to keep the fixture focused on correctness mechanics.
    id: { name: InvoiceId, backing: UUID }
    rules:
      - name: InvoiceAmountMustBePositive
        description: Invoice creation requires a strictly positive amount.
        violation: InvoiceAmountInvalid
        implementation:
          shape: predicate
    commands:
      - name: CreateInvoice
        description: Create an invoice for a booked slot.
        guidance: Triggered by the Billing connection reactions when Scheduling emits SlotBooked.
        payload:
          - { name: slotId, type: String }
          - { name: amountCents, type: Int }
        emits: [InvoiceCreated]
      - name: FailInvoice
        description: Mark an invoice as failed.
        guidance: Used to exercise reaction wiring back to Scheduling via ReleaseSlot.
        payload:
          - { name: invoiceId, type: InvoiceId }
          - { name: reason, type: String }
        emits: [InvoiceFailed]
    events:
      - name: InvoiceCreated
        description: An invoice has been created.
        guidance: Used by the BookingFlowManager transition and as a reaction source.
        payload:
          - { name: invoiceId, type: InvoiceId }
          - { name: slotId, type: String }
          - { name: amountCents, type: Int }
      - name: InvoiceFailed
        description: An invoice has failed.
        guidance: Triggers the release-slot reaction and closes the process manager flow.
        payload:
          - { name: invoiceId, type: InvoiceId }
          - { name: reason, type: String }

decisions:
  - name: InvoiceRiskBandDecision
    description: Classifies invoice risk using amount buckets.
    input:
      - { name: amountCents, type: Int }
    outcomes: [Low, Medium, High]
    pattern: classifier
    implementation:
      shape: numeric-buckets
  - name: InvoiceChannelDecision
    description: Chooses a fulfillment channel based on a billing mode label.
    input:
      - { name: billingMode, type: String }
    outcomes: [Email, Sms, Manual]
    pattern: classifier
    implementation:
      shape: lookup-table

queries:
  - name: GetInvoice
    description: Retrieve the current invoice projection.
    guidance: Used to exercise query generation and lint metadata coverage for Billing.
    parameters:
      - { name: invoiceId, type: InvoiceId }
    returns: InvoiceReadModel

readModels:
  - name: InvoiceReadModel
    description: Read model representation of an invoice for UI and query use.
    fields:
      - { name: invoiceId, type: InvoiceId }
      - { name: status, type: String }
