kind: PatternSpec
name: file-secret
requiredPrimitives: [Secret, EdgeBoundary, Policy]
testingContract:
  extends: credential-redaction
  adds:
    - file-source: file-backed secret paths are declared by key
    - reveal-policy: cleartext reveal requires a policy token
    - no-file-secret-leak: file secret values never appear in readable logs or artifacts
vocabHint: Use for mounted files or local secret material that should be referenced by key and revealed only by policy.
visualConcepts: [file, secret, mount, redaction, policy]
narrativeLabel: "(file-secret) {name} — resolves file credential {key} without leaking it"
