kind: PatternSpec
name: environment-secret
requiredPrimitives: [Secret, Policy]
testingContract:
  extends: credential-redaction
  adds:
    - env-source: environment variable names are declared and loaded as SecretRef values
    - reveal-policy: cleartext reveal requires a policy token
    - no-env-leak: environment values never appear in readable logs or artifacts
vocabHint: Use for process environment credentials that should be resolved at runtime without entering domain payloads.
visualConcepts: [environment, secret, redaction, policy, runtime]
narrativeLabel: "(environment-secret) {name} — resolves env credential {key} without leaking it"
