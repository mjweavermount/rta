kind: PatternSpec
name: credential-broker
requiredPrimitives: [Secret, Policy]
testingContract:
  extends: credential-redaction
  adds:
    - no-secret-log: secret material never appears in readable logs, traces, receipts, or errors
    - credential-source: each runtime credential names whether it is user-provided or shared infrastructure
    - denied-path: a missing or denied credential returns a policy receipt instead of attempting a call
vocabHint: Runtime capabilities declare secretFields and tools declare credentialMode.
visualConcepts: [secret, redaction, operator, vault, deny]
narrativeLabel: "(credential-broker) {name} — resolves {credentialMode} credentials without leaking them"
