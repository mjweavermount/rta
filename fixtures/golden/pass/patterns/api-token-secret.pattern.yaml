kind: PatternSpec
name: api-token-secret
description: Represents API-token credentials as named secret references with reveal policy and redaction guarantees.
requiredPrimitives: [Secret, Policy]
testingContract:
  extends: credential-redaction
  adds:
    - token-namespace: API tokens are namespaced before delegating to a backing secret store
    - reveal-policy: cleartext reveal requires a policy token
    - no-token-leak: API token values never appear in readable logs or artifacts
vocabHint: Use when an adapter needs API tokens backed by env, file, Vault, or another SecretStore.
visualConcepts: [api-token, credential, namespace, redaction, policy]
narrativeLabel: "(api-token-secret) {name} — resolves API token {key} through a backing secret store"
