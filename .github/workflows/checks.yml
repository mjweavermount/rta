name: checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  work-ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check:production
      - run: pnpm run audit
