name: checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  work-ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: npm run check
