name: checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  work-ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run check:production
      - run: npm run check:release
      - run: npm run doctor
      - run: npm run audit
