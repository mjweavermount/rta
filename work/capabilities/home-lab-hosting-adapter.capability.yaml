kind: Capability
id: home-lab-hosting-adapter
name: HomeLabHostingAdapter
status: in-progress
why: RTA apps should be easy to run in Virgil's home lab without making home-lab deployment mandatory.
ownedBy:
  internal: rta-platform
  plane: LAB-41
demonstratedBy:
  - artifact: generated WorkloadApp intent
  - artifact: generated WorkloadApp draft package
  - command: WORKLOAD_APPS_DIR=tmp/rta-workload-root/tmp/workload-apps nix develop --command scripts/test/integrity/workload-apps.rb
  - optionalDemo: approved home-lab deployment
requires:
  - GeneratedAppCliRuntimeWiring
  - HostingAdapterContract
produces:
  - packages/hosting-adapters
  - home-lab adapter
  - WorkloadApp generation path
  - .rta/hosting/workload-apps
