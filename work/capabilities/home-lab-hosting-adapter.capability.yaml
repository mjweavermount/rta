kind: Capability
id: home-lab-hosting-adapter
name: HomeLabHostingAdapter
status: demo-covered
why: RTA apps should be easy to run in Virgil's home lab without making home-lab deployment mandatory.
ownedBy:
  internal: rta-platform
  plane: LAB-41
demonstratedBy:
  - command: pnpm --filter @rta/cli rta check --deployment-contract --root ../../fixtures/golden/pass
  - artifact: deploymentIntents in golden Billing context
  - optionalDemo: approved home-lab deployment
qaSteps:
  - do: run pnpm --filter @rta/cli rta check --deployment-contract --root ../../fixtures/golden/pass
  - do: inspect BillingHomeLabDraft deploymentIntent in fixtures/golden/pass/vocab/contexts/billing.context.yaml
  - see: optional deployment output is represented without writing to the live lab
  - see: home-lab deployment is an adapter target, not a hard requirement for local app execution
requires:
  - GeneratedAppCliRuntimeWiring
  - HostingAdapterContract
produces:
  - host-neutral deployment intent vocabulary
  - home-lab WorkloadApp draft target
  - deployment-contract CLI check
