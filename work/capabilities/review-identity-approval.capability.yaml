kind: Capability
id: review-identity-approval
name: ReviewIdentityApproval
status: demo-covered
why: Human review should be an internal QA/demo/approval gate with actor identity and audit trail, not a mandatory external board dependency.
ownedBy:
  internal: rta-platform
  plane: LAB-44
demonstratedBy:
  - integration: review action records actor and audit trail
  - command: rta review approve
  - command: generated app review approve
qaSteps:
  - do: run pnpm check:sample-app-loop
  - do: run node scripts/rta.mjs review approve <review-id> --actor Virgil after a review-producing scenario
  - see: review item records approved state, actor identity, and audit trail before dry-run publication
requires:
  - RuntimePorts
  - WorkLedger
produces:
  - packages/review
  - ReviewGate
  - ApprovalActor
  - audit trail event
