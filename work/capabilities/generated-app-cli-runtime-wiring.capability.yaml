kind: Capability
id: generated-app-cli-runtime-wiring
name: GeneratedAppCliRuntimeWiring
status: demo-covered
why: Authored apps need their own operational CLI backed by the same runtime wiring used in scenarios and production.
ownedBy:
  internal: rta-platform
  plane: LAB-39
demonstratedBy:
  - integration: end-to-end-demo-harness
  - command: app-cli run
  - command: rta check --app-cli
  - command: rta generate app .rta/generated/scaffold/test-app
requires:
  - UseCaseScenarioCoverage
  - RuntimePorts
produces:
  - packages/app-cli
  - packages/app-wiring
  - packages/generators
  - generated app command surface
