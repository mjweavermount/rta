kind: Capability
id: generated-app-cli-runtime-wiring
name: GeneratedAppCliRuntimeWiring
status: demo-covered
why: Authored apps need their own operational CLI backed by the same runtime wiring used in scenarios and production.
ownedBy:
  internal: rta-platform
  plane: LAB-39
demonstratedBy:
  - integration: end-to-end-demo-harness
  - command: generated app watch --trace
  - command: generated app status
  - command: generated app logs tail
  - command: generated app graph run
  - command: generated app review approve
  - command: rta generate app .rta/generated/scaffold/test-app
qaSteps:
  - do: run pnpm check:sample-app-loop
  - see: generated app installs, generates, builds, runs watch mode, prints logs, exposes graph output, and approves a review item
requires:
  - UseCaseScenarioCoverage
  - RuntimePorts
produces:
  - packages/cli
  - packages/runtime
  - packages/generators
  - generated app command surface
