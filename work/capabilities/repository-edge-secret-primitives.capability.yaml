kind: Capability
id: repository-edge-secret-primitives
name: RepositoryEdgeSecretPrimitives
status: in-progress
why: Repository, edge boundary, file-backed/in-memory storage, SQL safety, and secrets need first-class vocab/runtime primitives instead of informal security guidance.
ownedBy:
  internal: rta-platform
demonstratedBy:
  - doc: docs/rta-repository-edge-secret-primitives.md
  - command: pnpm --filter @rta/runtime test
qaSteps:
  - do: run pnpm --filter @rta/runtime test
  - see: Repository, EdgeBoundary, FileBackedRepository, InMemoryRepository, and Secret primitives execute through instrumented Effect runtime code
  - see: SecretRef stringification, JSON serialization, readable logs, and FileRuntime artifacts redact secret values
  - see: SqlBoundary and vocab blooming remain pending
requires:
  - PureTsEffectRuntime
  - RuntimePorts
  - SecurityHardening
produces:
  - T1.Repository
  - T1.EdgeBoundary
  - T1.Secret
  - T2.Pattern.FileBackedRepository
  - T2.Pattern.InMemoryRepository
  - Effect repository services
  - Effect edge-boundary services
  - Effect secret services
  - SecretRedactor
  - artifact secret redaction
