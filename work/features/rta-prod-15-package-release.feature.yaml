kind: Feature
id: rta-prod-15-package-release
name: RtaProd15PackageRelease
status: demo-covered
why: RTA needs credible package, CI, release, dependency, and vulnerability hygiene before it can author production apps.
ownedBy:
  internal: rta-platform
demonstratedBy:
  - command: pnpm audit --audit-level high
  - command: rta doctor
qaSteps:
  - do: run pnpm check:release
  - do: run pnpm doctor
  - do: run pnpm audit
  - do: run pnpm check:production
  - see: RtaProd15PackageRelease produces visible evidence or a successful check result
requires:
  - CiPackageReleaseHygiene
produces:
  - CI production check workflow
  - package/export policy
  - vulnerability and dependency hygiene checks
selfAudit:
  - "@is this releasable and maintainable, or only runnable from this local checkout?"
