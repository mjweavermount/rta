kind: Feature
id: rta-prod-11-generated-app-runtime-wiring
name: RtaProd11GeneratedAppRuntimeWiring
status: demo-covered
why: Generated apps need operational CLIs, AppRuntime schema, process topology, scenario targets, and parity across CLI, scenario runner, worker, and production runtime.
ownedBy:
  internal: rta-platform
demonstratedBy:
  - command: rta check --app-cli
  - command: rta check --runtime-wiring
  - command: rta check --scenario-runtime-parity
qaSteps:
  - do: node scripts/rta.mjs generate app-cli
  - do: node scripts/rta.mjs check --runtime-wiring
  - do: node scripts/rta.mjs check --scenario-runtime-parity
  - do: node .rta/generated/meeting-digest/meeting-digest.mjs watch --input tests/fixtures/custom-transcript.txt
  - see: RtaProd11GeneratedAppRuntimeWiring produces visible evidence or a successful check result
requires:
  - GeneratedAppCliRuntimeWiring
  - RtaProd08RuntimeUnitOfWork
produces:
  - AppRuntime schema
  - generated app wiring bootstrap
  - parity checks for scenario and production paths
selfAudit:
  - "@does generated app CLI, scenario runner, worker, and production process use the same wiring contract?"
