kind: Feature
id: rta-prod-12-meeting-digest-seed
name: RtaProd12MeetingDigestSeed
status: demo-covered
why: Meeting digest is the proving app and must be rebuilt against finished RTA contracts, not handmade shortcuts.
ownedBy:
  internal: rta-platform
demonstratedBy:
  - command: meeting-digest scenario run approved-digest-publishes-work-items
  - artifact: reviewable digest
qaSteps:
  - run: node examples/meeting-digest-seed/bin/meeting-digest.mjs scenario run approved-digest-publishes-work-items --review --high
  - inspect: run artifacts include approved-digest-work-items.json
  - run: node scripts/rta.mjs review approve <review-id> --actor Virgil
  - run: node scripts/rta.mjs publish dry-run <review-id> --target fixture
requires:
  - MeetingDigestProvingApp
  - RtaProd11GeneratedAppRuntimeWiring
produces:
  - generated meeting digest app scaffold
  - transcript and pasted-text intake
  - reviewable digest and extracted work items
selfAudit:
  - "@is meeting digest using RTA-generated contracts and leaves, or is it still a hand-built demo wearing RTA labels?"
