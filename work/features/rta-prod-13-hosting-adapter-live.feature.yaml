kind: Feature
id: rta-prod-13-hosting-adapter-live
name: RtaProd13HostingAdapterLive
status: demo-covered
why: Hosting must remain optional but native, with host-neutral intent, home-lab WorkloadApp output, container image, healthcheck, and optional live promotion.
ownedBy:
  internal: rta-platform
demonstratedBy:
  - command: pnpm --filter @rta/cli rta check --deployment-contract --root ../../fixtures/golden/pass
  - command: pnpm --filter @rta/cli rta check --deployment-contract --root ../../fixtures/golden/fail/deployment-contract-required-home-lab
qaSteps:
  - do: run pnpm --filter @rta/cli rta check --deployment-contract --root ../../fixtures/golden/pass
  - do: run pnpm --filter @rta/cli rta check --deployment-contract --root ../../fixtures/golden/fail/deployment-contract-required-home-lab and confirm it exits non-zero
  - see: golden fixture has a host-neutral container intent plus an optional home-lab WorkloadApp draft intent
  - see: required home-lab deployment fails because lab promotion is optional and requires explicit operator approval
requires:
  - HomeLabHostingAdapter
  - RtaProd11GeneratedAppRuntimeWiring
produces:
  - host-neutral deployment intent
  - containerized app path
  - home-lab promotion and validation flow
  - deployment-contract check
  - deployment-intent pattern
selfAudit:
  - "@is this deployable as an RTA-authored app, or only renderable as a draft artifact?"
  - "@is home-lab deployment optional rather than required for all RTA apps?"
