kind: Feature
id: rta-prod-08-runtime-unit-of-work
name: RtaProd08RuntimeUnitOfWork
status: demo-covered
why: Runtime execution needs a unit-of-work model, flow runner, scheduler/worker contract, simulated time, replay, provenance, and artifact ports.
ownedBy:
  internal: rta-platform
demonstratedBy:
  - command: rta run
  - command: rta scenario replay
  - command: rta scheduler start --once
qaSteps:
  - do: node scripts/rta.mjs scenario run meeting-digest.integrated.fixture --input tests/fixtures/custom-transcript.txt --high
  - do: node scripts/rta.mjs scenario replay <run-id>
  - do: node scripts/rta.mjs queue enqueue meeting-digest.integrated.fixture --input tests/fixtures/custom-transcript.txt --review
  - do: node scripts/rta.mjs scheduler start --once
  - see: RtaProd08RuntimeUnitOfWork produces visible evidence or a successful check result
requires:
  - RuntimePorts
  - SchedulerQueue
produces:
  - unit of work runtime
  - simulated time hooks
  - replayable run records
selfAudit:
  - "@can I watch, replay, and explain a run from logs/provenance without reading source?"
