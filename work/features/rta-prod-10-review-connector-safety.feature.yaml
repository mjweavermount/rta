kind: Feature
id: rta-prod-10-review-connector-safety
name: RtaProd10ReviewConnectorSafety
status: planned
why: Review must be a first-class primitive, and external writes must be blocked unless connector policy and review artifacts allow them.
ownedBy:
  internal: rta-platform
demonstratedBy:
  - command: rta check --review-gates
  - command: rta check --connector-safety
requires:
  - ReviewIdentityApproval
  - SecurityHardening
produces:
  - review primitive contract
  - connector data sensitivity policy
  - external write safety checks
selfAudit:
  - "@can any external write happen without a declared connector policy and approved review artifact?"

