kind: Feature
id: rta-prod-17-repository-edge-secret-vocab
name: RtaProd17RepositoryEdgeSecretVocab
status: demo-covered
why: Repository storage, edge-boundary trust promotion, secrets, ports, DTO boundary schemas, adapter bindings, and published languages must bloom through vocab into generated checks, logs, tests, and runtime layers.
ownedBy:
  internal: rta-platform
demonstratedBy:
  - doc: docs/rta-repository-edge-secret-primitives.md
  - command: pnpm --filter @rta/vocab test
  - command: pnpm --filter @rta/cli rta check --pattern-specs --root ../../fixtures/golden/pass
  - command: pnpm --filter @rta/cli rta check --pattern-contracts --root ../../fixtures/golden/pass
  - command: pnpm --filter @rta/runtime test
qaSteps:
  - do: run pnpm --filter @rta/vocab test
  - do: run pnpm --filter @rta/cli rta check --pattern-specs --root ../../fixtures/golden/pass
  - do: run pnpm --filter @rta/cli rta check --pattern-contracts --root ../../fixtures/golden/pass
  - do: run pnpm --filter @rta/runtime test
  - see: in-memory repo, file-backed repo, edge-boundary validation, file path rejection, and secret redaction pass
  - see: port, DTO boundary schema, adapter binding, published OpenAPI language, and anti-corruption-layer pattern specs validate in the golden fixture
requires:
  - RepositoryEdgeSecretPrimitives
  - RtaProd16PureTsEffectPurge
produces:
  - boundary vocabulary schemas
  - port declarations
  - DTO boundary schema declarations
  - adapter binding declarations
  - published language declarations
  - anti-corruption-layer pattern
  - runtime repository primitive implementations
  - runtime edge-boundary primitive implementations
  - runtime secret primitive implementation
  - minimum demo app repository storage contract
selfAudit:
  - "@does file-backed repo treat disk as untrusted edge input?"
  - "@do external DTOs get validated and translated before domain logic sees them?"
  - "@does OpenAPI stay a boundary/published-language contract rather than the domain model?"
  - "@does in-memory repo prove scenario isolation and deterministic tests?"
  - "@can a secret stringify into a readable log or artifact?"
