kind: Feature
id: rta-prod-16-pure-ts-effect-purge
name: RtaProd16PureTsEffectPurge
status: planned
why: The repo still has active `.mjs` source; production RTA should be pure TypeScript with Effect services/layers for runtime behavior.
ownedBy:
  internal: rta-platform
demonstratedBy:
  - command: pnpm check:pure-ts
  - doc: docs/rta-pure-ts-effect-migration.md
qaSteps:
  - do: run pnpm check:pure-ts
  - see: new tracked JS/MJS/CJS files fail the check
  - see: remaining tracked MJS files are explicitly listed in docs/rta-pure-ts-allowlist.txt for burn-down
requires:
  - PureTsEffectRuntime
produces:
  - pure TypeScript migration rail
  - tracked JS/MJS/CJS burn-down list
  - future hard gate for zero tracked JavaScript source
selfAudit:
  - "@did I reduce the allowlist, or only preserve the hybrid state?"
  - "@did Effect own runtime IO, or did I only rename files?"
  - "@did generated apps still run after every MJS removal?"
