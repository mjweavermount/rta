kind: Feature
id: rta-prod-16-pure-ts-effect-purge
name: RtaProd16PureTsEffectPurge
status: demo-covered
why: The repo must stay pure TypeScript source; production RTA should use Effect services/layers for runtime behavior.
ownedBy:
  internal: rta-platform
demonstratedBy:
  - command: pnpm check:pure-ts
  - doc: docs/rta-pure-ts-effect-migration.md
qaSteps:
  - do: run pnpm check:pure-ts
  - see: new tracked JS/MJS/CJS files fail the check
  - see: the allowlist is empty and the check reports no tracked JS/MJS/CJS source remains
requires:
  - PureTsEffectRuntime
produces:
  - pure TypeScript source gate
  - empty tracked JS/MJS/CJS allowlist
  - deletion of legacy MJS source
selfAudit:
  - "@did I keep the allowlist empty?"
  - "@did Effect own runtime IO, or did I only rename files?"
  - "@did generated apps still run after every MJS removal?"
