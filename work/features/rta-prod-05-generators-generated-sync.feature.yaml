kind: Feature
id: rta-prod-05-generators-generated-sync
name: RtaProd05GeneratorsGeneratedSync
status: demo-covered
why: RTA must generate scaffolds, tests, telemetry expectations, operation event contracts, review gates, and app docs with derivation hashes and drift checks.
ownedBy:
  internal: rta-platform
demonstratedBy:
  - command: rta generate
  - command: rta check --generated-sync
qaSteps:
  - do: node scripts/rta.mjs generate
  - do: node scripts/rta.mjs check --generated-sync
  - do: run node --test tests/platform.test.mjs
  - see: RtaProd05GeneratorsGeneratedSync produces visible evidence or a successful check result
requires:
  - RtaProd04DerivationEngine
produces:
  - generated file classification
  - derivation hash headers
  - generated obligation and scenario stubs
selfAudit:
  - "@did generated artifacts carry hashes and regeneration policy, or can drift hide?"
