status: demo-covered
why: RTA must generate scaffolds, tests, telemetry expectations, log ceremonies, review gates, and app docs with derivation hashes and drift checks.
ownedBy:
  internal: rta-platform
demonstratedBy:
  - command: rta generate
  - command: rta check --generated-sync
qaSteps:
